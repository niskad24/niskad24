<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Super Admin Page</h1>
    <button onclick="goBack()">Back</button>
    <div id="requests"></div>

    <script>
        function goBack() {
            window.location.href = 'index.html';
        }

        function fetchRequests() {
            const requestsDiv = document.getElementById('requests');
            // Mock data for demonstration
            const requests = [
                { name: 'John Doe', email: 'john@example.com', phone: '1234567890', role: 'pending' }
            ];

            requests.forEach(request => {
                const requestDiv = document.createElement('div');
                requestDiv.innerHTML = `
                    <p>Name: ${request.name}</p>
                    <p>Email: ${request.email}</p>
                    <p>Phone: ${request.phone}</p>
                    <button onclick="approveRequest('${request.name}')">Approve</button>
                    <button onclick="rejectRequest('${request.name}')">Reject</button>
                `;
                requestsDiv.appendChild(requestDiv);
            });
        }

        function approveRequest(name) {
            alert(`Approved request for ${name}`);
        }

        function rejectRequest(name) {
            alert(`Rejected request for ${name}`);
        }

        window.onload = fetchRequests;
    </script>
</body>
</html>
