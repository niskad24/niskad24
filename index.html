<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Web App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to the Community Web App</h1>
    <button onclick="showLogin()">Login</button>
    <button onclick="showJoin()">Join Niskad2024 Community</button>
    
    <div id="loginForm" style="display:none;">
        <h2>Login</h2>
        <form id="login">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username"><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br>
            <button type="button" onclick="login()">Login</button>
        </form>
    </div>

    <div id="joinForm" style="display:none;">
        <h2>Join Niskad2024 Community</h2>
        <form id="join">
            <label for="joinName">Name:</label>
            <input type="text" id="joinName" name="joinName"><br>
            <label for="joinUsername">Username:</label>
            <input type="text" id="joinUsername" name="joinUsername"><br>
            <label for="joinPassword">Password:</label>
            <input type="password" id="joinPassword" name="joinPassword"><br>
            <label for="joinEmail">Email:</label>
            <input type="email" id="joinEmail" name="joinEmail"><br>
            <label for="joinPhone">Phone:</label>
            <input type="tel" id="joinPhone" name="joinPhone"><br>
            <button type="button" onclick="requestToJoin()">Request to Join</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
